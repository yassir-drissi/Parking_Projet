version: '3.8'

services:

  mongodb:
    image: mongo:latest
    container_name: parking_mongodb
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: parking_db

  redis:
    image: redis:latest
    container_name: parking_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build: ./backend
    container_name: parking_backend
    ports:
      - "3000:3000"
    depends_on:
      - mongodb
      - redis
    environment:
      MONGO_URL: mongodb://mongodb:27017/parking_db
      REDIS_URL: redis://redis:6379
      MQTT_BROKER: mqtt://broker.hivemq.com

volumes:
  mongo_data:
  redis_data: